- name: Installing node.js with suitable version
  host: catalogue
  become: yes
  tasks:
    - name: selecting node version 20
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: Installing node.js
      ansible.builtin.dnf:
        name: nodejs
        state: present

    - name: create a system user roboshop
      ansible.builtin.user:
        name: roboshop
        system: true
        home: /app
        shell: /sbin/nologin
        comment: "roboshop system user"

    - name: delete app directory 
      ansible.builtin.file:
        path: /app
        state: absent

    - name: create app directory
      ansible.builtin.file:
        path: /app
        state: directory

    - name: delete catalogue zip file
      ansible.builtin.file:
        path: /tmp/catalogue.zip
        state: absent

    - name: download catalogue
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
        dest: /tmp/catalogue.zip

    - name: unarchieve catalogue
      ansible.builtin.unarchieve:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes
      
    - name: install depencencies
      community.general.npm:
        path: /app
    - name: copy catalogue
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service
    - name: copy mongo repo
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo
    - name: Install mongodb client
      ansible.builtin.dnf:
        name: mongodb-mongosh 
        state: present
    - name: check products loaded 
      ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
      register: catalogue_output
    - name: start and enable services
      ansible.builtin.service:


    

      