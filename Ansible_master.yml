- name: Creating the ec2 Instances and DNS 
  hosts: all
  connection: local
  vars:
    sg: sg-0944b77fa17921eaf
    id: ami-0220d79f3f480ecf5
    env: dev
    action: create
    domain_name: cerry.in
    instance:
      - mongodb
      - catalogue
      - redis
      - user
      - cart
      - mysql
      - rabbitmq
      - payment
      - frontend

  tasks:
    - name: creating ec2 Instances
      amazon.aws.ec2_instance:
        instance_type: "t3.micro"
        security_group: "{{ sg }}"
        image_id: "{{ id }}"
        name: "{{ item }}-{{ env }}"
        tags:
          Project: roboshop
          Component: "{{ item }}"
          Environment: "{{ env }}"
          Name: "{{ item }}-{{ env }}"
      loop: "{{ instance }}"
      register: ec2_output
      when: action == "create"

    - name: print the output
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"

    - name: creating dns route 53
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}-{{ env }}.{{ domain_name }}"
        type: A 
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        overwrite: true
      loop: "{{ ec2_output.results }}"
      when: action == "create"

    - name: creating dns for the frontend 
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record:  "{{ item.item }}-{{ env }}.{{ domain_name }}"
        type: A 
        ttl: 1
        value: "{{ item.instances[0].public_ip_address }}"
      loop: "{{ ec2_output.results }}"
      when: 
      - item.item == "frontend"
      - action == "create"

    - name: delete route53 record
      amazon.aws.route53:
        state: absent
        zone: "{{ domain_name }}"
        record: "{{ item.item }}-{{ env }}.{{ domain_name }}"
        type: A
        ttl: 1
      loop: "{{ instances }}"
      when: action == "destroy"

    - name: delete ec2 instance
      amazon.aws.ec2_instance:
        state: absent
        name: "{{ item }}-{{ env }}"
      loop: "{{ instances }}"
      when: action == "destroy"






